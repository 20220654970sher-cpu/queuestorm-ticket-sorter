services:
  - type: web
    name: queuestorm-ticket-sorter
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: APP_ENABLE_AUDIT
        value: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.62"
