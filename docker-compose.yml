services:
  api:
    build: .
    container_name: queuestorm-ticket-sorter
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - APP_ENV=local-docker
      - PORT=8000
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
